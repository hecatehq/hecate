# Quickstart stack. Single-user gateway plus bundled companion binaries. A
# `docker compose up` is enough to try Hecate end-to-end on
# http://127.0.0.1:8765. Persistence is sqlite into the hecate-data
# volume; nothing else to wire up.
#
# ── Local inference from Docker ──────────────────────────────────────────────
# Hecate discovers models by calling /v1/models on each local provider.
# From inside a container, 127.0.0.1 is the container's own loopback, so the
# provider base URLs below use host.docker.internal instead, which resolves to
# the Docker host (your Mac / Linux machine).
#
# IMPORTANT: local inference servers bind to 127.0.0.1 by default, which
# rejects connections that arrive from the Docker bridge interface. You must
# tell them to accept all interfaces before Hecate can reach them:
#
#   Ollama (host install):
#     OLLAMA_HOST=0.0.0.0 ollama serve
#
#   LM Studio: Settings → Local Server → Server bind host → 0.0.0.0
#
#   llama.cpp / LocalAI: pass --host 0.0.0.0 to the server binary
#
# When the hecate image isn't on a registry yet, this builds locally from
# the Dockerfile in the same directory. Once published, the `image:` tag
# below also doubles as the pull target so `docker compose pull` works.

services:
  hecate:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/hecatehq/hecate:latest
    ports:
      - "8765:8765"
    # extra_hosts injects host.docker.internal on Linux (macOS/Windows Docker
    # Desktop provide it automatically). See the header comment for why all
    # local-inference URLs use host.docker.internal and the 0.0.0.0 bind
    # requirement for host-native inference servers.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      GATEWAY_PUBLIC_URL: "http://127.0.0.1:8765"
      PROVIDER_OLLAMA_BASE_URL: "http://host.docker.internal:11434/v1"
      PROVIDER_LMSTUDIO_BASE_URL: "http://host.docker.internal:1234/v1"
      PROVIDER_LLAMACPP_BASE_URL: "http://host.docker.internal:8080/v1"
      PROVIDER_LOCALAI_BASE_URL: "http://host.docker.internal:8080/v1"
    env_file:
      # required:false lets users skip creating .env without breaking
      # `docker compose up`. Compose 2.24+ understands this shape.
      - path: .env
        required: false
    volumes:
      # Persist the bootstrap file (auto-generated control-plane encryption
      # key) and any file-backed control-plane state across restarts. Without
      # this, provider credentials encrypted in SQLite would become unreadable
      # after the volume is recreated.
      - hecate-data:/data
    restart: unless-stopped

volumes:
  hecate-data:
