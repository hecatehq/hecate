version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(go)"
    labels:
      - dependencies

  # GitHub Dependabot still calls JavaScript package manifests "npm" even
  # when the project uses Bun. The UI source of truth is ui/package.json plus
  # ui/bun.lock; local dev and CI install/run everything with Bun.
  - package-ecosystem: npm
    directory: "/ui"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(ui)"
    labels:
      - dependencies

  - package-ecosystem: npm
    directory: "/website"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(website)"
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
    labels:
      - dependencies
