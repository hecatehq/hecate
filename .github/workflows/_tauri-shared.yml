name: tauri-shared

# Reusable Tauri matrix build. Called by:
#   - release.yml      (tagged release: tagName set → tauri-action uploads to GitHub Release)
#   - tauri-build.yml  (PR validation: uploadArtifacts true → preserved as workflow artifact)
#
# When you change anything in this file, both callers pick it up
# automatically. Keep their path filters wide enough to trigger on
# changes to this workflow itself.

on:
  workflow_call:
    inputs:
      tagName:
        description: 'Git tag to attach release artifacts to. Empty → build only, no release upload.'
        type: string
        required: false
        default: ''
      uploadArtifacts:
        description: 'Upload built bundles as workflow artifacts (for PR runs).'
        type: boolean
        required: false
        default: false

# Maximum permissions any caller needs:
#   - contents: write   tauri-action uploads bundles to a GitHub Release
#                       (when called from release.yml with tagName set)
# Callers that don't upload (PR validation via tauri-build.yml) restrict
# this back down to contents: read at their own workflow-level block.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: app,dmg
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi
    runs-on: ${{ matrix.os }}
    # bash for every run: step. Resolves to Git Bash on Windows runners,
    # which is what the Justfile shell recipes and our cp/if blocks need.
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # stamp-version.ts resolves version from latest git tag

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        # Cache restore/save is an optimization only. A transient cache
        # action failure must not block release packaging, especially on
        # Windows runners where cache restore can fail before build steps.
        continue-on-error: true
        with:
          workspaces: tauri/src-tauri -> target

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Set up just
        uses: extractions/setup-just@v4

      # Tauri 2.x prerequisites for Ubuntu 22.04 (per the official docs).
      # webkit2gtk 4.1 is the Tauri 2 requirement; 4.0 ships by default.
      # patchelf is required by the AppImage bundler. libxdo-dev is for
      # global-shortcut/clipboard plugins (kept ready, not currently used).
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf

      - name: Install UI dependencies
        run: just ui-install

      - name: Build hecate sidecars
        run: just build
      - name: Build hecate-acp sidecar
        run: just build-acp

      # Tauri's bundler looks for binaries/<name>-{triple}[.exe] at bundle
      # time. Replicate `just tauri-sidecar` so the matrix triple is always
      # used (not whatever rustc on the runner reports).
      - name: Stage hecate sidecars
        run: |
          mkdir -p tauri/src-tauri/binaries
          for name in hecate hecate-acp; do
            if [[ "$RUNNER_OS" == "Windows" ]]; then
              if [[ -f "${name}.exe" ]]; then src="${name}.exe"
              elif [[ -f "$name" ]];     then src="$name"
              else echo "no ${name} binary found after build"; ls -la; exit 1
              fi
              cp "$src" "tauri/src-tauri/binaries/${name}-${{ matrix.target }}.exe"
            else
              cp "$name" "tauri/src-tauri/binaries/${name}-${{ matrix.target }}"
            fi
          done

      # Runs Rust-side unit tests for deterministic native helpers. This keeps
      # sidecar path/port logic covered in CI without launching GUI windows.
      # The packaged app lifecycle smoke remains opt-in via
      # `just test-tauri-smoke`.
      - name: Run Tauri Rust tests
        run: cd tauri/src-tauri && cargo test

      # tauri-action's auto-install is unreliable when projectPath is set;
      # install explicitly so node_modules/.bin/tauri exists for the build.
      - name: Install Tauri JS dependencies
        run: cd tauri && bun install --frozen-lockfile

      # Stamps Cargo.toml, package.json, and tauri.conf.json. Resolution
      # order: TAURI_VERSION env → latest git tag → existing Cargo.toml.
      - name: Stamp Tauri version
        run: bun scripts/stamp-version.ts

      # Single tauri-action call serves both modes:
      #   - tagName empty  → build only (PR validation via tauri-build.yml)
      #   - tagName set    → upload to the existing GitHub Release for that tag
      #                      (release.yml after a `v*` tag push)
      #
      # macOS signing/notarization protections are documented in the
      # env: block below.
      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          # `github.token` is the per-job-run token, available in every
          # workflow run without needing secrets-inherit at the caller.
          # Using it (instead of `secrets.GITHUB_TOKEN`) lets
          # tauri-build.yml call this workflow WITHOUT `secrets:
          # inherit` — see that file's job-level comment for why
          # withholding inherit is the load-bearing protection
          # against PR-side secret exfiltration.
          GITHUB_TOKEN: ${{ github.token }}
          # Apple signing/notarization secrets. Two independent
          # protections in series:
          #
          #   1. Caller-side (load-bearing): tauri-build.yml does NOT
          #      `secrets: inherit`, so when called from PR validation
          #      these `secrets.APPLE_*` references resolve to empty
          #      unconditionally — the caller never made them available.
          #      Even if a malicious PR rewrites this called workflow,
          #      the secret values aren't in the calling job's context.
          #
          #   2. Called-side (defense in depth): the conditional
          #      expressions below scope to the macOS leg of a
          #      tag-pushed release. Belt-and-suspenders against future
          #      misconfiguration where some other caller might
          #      inherit secrets unintentionally.
          #
          # KEYCHAIN_PASSWORD is the transient password for the temp
          # keychain tauri-action creates on the runner — its value
          # never matters again. See docs/macos-signing.md for the
          # operator-side setup checklist.
          APPLE_CERTIFICATE: ${{ matrix.os == 'macos-latest' && inputs.tagName != '' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ matrix.os == 'macos-latest' && inputs.tagName != '' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.os == 'macos-latest' && inputs.tagName != '' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ matrix.os == 'macos-latest' && inputs.tagName != '' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ matrix.os == 'macos-latest' && inputs.tagName != '' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.os == 'macos-latest' && inputs.tagName != '' && secrets.APPLE_TEAM_ID || '' }}
          KEYCHAIN_PASSWORD: ${{ matrix.os == 'macos-latest' && inputs.tagName != '' && secrets.KEYCHAIN_PASSWORD || '' }}
          # Updater signing key. Same caller-side / called-side
          # protection model as the Apple secrets above: scope to a
          # release-workflow run with a non-empty tagName. When set,
          # tauri-action signs the platform bundles and emits a
          # latest.json manifest as a release asset that the in-app
          # updater consumes. When empty (PR validation, missing
          # secrets), unsigned bundles ship and the updater stays
          # inert. See docs/desktop-updater-signing.md for the
          # keypair custody checklist.
          TAURI_SIGNING_PRIVATE_KEY: ${{ inputs.tagName != '' && secrets.TAURI_UPDATER_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ inputs.tagName != '' && secrets.TAURI_UPDATER_PRIVATE_KEY_PASSWORD || '' }}
        with:
          projectPath: tauri
          tagName: ${{ inputs.tagName }}
          args: --bundles ${{ matrix.bundles }}

      # Upload updater payloads (.tar.gz / .zip + .sig) to the GitHub
      # Release alongside the platform bundles. tauri-action's default
      # release-upload step only handles the explicit platform bundles
      # (.dmg/.deb/.AppImage/.msi); it doesn't upload `.sig` files or
      # the macOS `.app.tar.gz` updater payload that tauri's bundler
      # produces when an updater signing key is configured. Without
      # this step:
      #   - macOS: latest.json's `.app.tar.gz` URL would 404.
      #   - Linux/Windows: the raw `.AppImage`/`.msi` are uploaded by
      #     tauri-action, but their matching `.sig` files aren't —
      #     latest.json's signature field would point at nothing.
      # We over-upload (also grab wrapped `.AppImage.tar.gz` /
      # `.msi.zip` and their `.deb`/`.rpm` siblings) because filtering
      # to exactly the referenced files would be brittle across tauri
      # bundler versions. The stitch job picks the canonical raw forms.
      # Skipped on PR-validation runs (no tagName).
      #
      # The macOS Hecate.app.tar.gz has no version in its filename — each
      # tag's release has its own copy, so versions don't clobber each
      # other across releases. The --clobber flag below only matters for
      # re-running this workflow on the same tag (rare; lets us re-upload
      # a corrected build without manual cleanup).
      #
      # macOS-latest ships bash 3.2, which lacks `shopt -s globstar` and
      # `mapfile`. We use `find` + positional-param accumulation to stay
      # 3.2-compatible. Process substitution `< <(...)` IS in 3.2.
      - name: Upload updater payloads to release
        if: inputs.tagName != ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd tauri/src-tauri/target/release/bundle
          set --
          while IFS= read -r f; do
            set -- "$@" "$f"
          done < <(find . \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sig' \) -type f | sort)
          if [ $# -eq 0 ]; then
            echo "no updater payloads produced for ${{ matrix.target }} — skip upload"
            exit 0
          fi
          printf '  - %s\n' "$@"
          gh release upload "${{ inputs.tagName }}" "$@" \
            --clobber \
            --repo "${{ github.repository }}"

      # Persist as workflow artifact for PR runs so reviewers can download
      # and test-launch from the run page. Skipped on tagged releases —
      # those upload directly to the GitHub Release.
      - name: Upload bundles as workflow artifacts
        if: ${{ inputs.uploadArtifacts }}
        uses: actions/upload-artifact@v7
        with:
          name: tauri-${{ matrix.target }}
          path: |
            tauri/src-tauri/target/release/bundle/dmg/*.dmg
            tauri/src-tauri/target/release/bundle/deb/*.deb
            tauri/src-tauri/target/release/bundle/appimage/*.AppImage
            tauri/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 14

  # After all matrix legs finish, stitch the per-platform updater
  # signatures into a single latest.json manifest and upload it to
  # the release. tauri-action's `includeUpdaterJson: true` mode runs
  # per matrix leg and only sees the current platform's signature —
  # so it skips the upload entirely when it can't build a complete
  # manifest. This is the documented multi-platform workaround.
  #
  # `needs: build` means: only run if every matrix leg succeeded.
  # If any platform failed, no manifest gets published — installs
  # keep using the prior release's manifest until the next signed
  # build covers all three platforms.
  publish-updater-manifest:
    name: publish updater manifest
    if: inputs.tagName != ''
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download updater signatures from release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p sigs
          gh release download "${{ inputs.tagName }}" \
            --pattern '*.sig' \
            --dir sigs \
            --repo "${{ github.repository }}"
          ls -la sigs/

      - name: Build latest.json
        run: |
          set -euo pipefail
          # nullglob: when no .sig was downloaded, the loop body should
          # skip rather than receiving the literal pattern as $sig (which
          # would fail at `cat` with a less actionable error than our
          # explicit missing-signature check below).
          shopt -s nullglob
          version="${TAG#v}"
          pub_date=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")

          darwin_sig=""; darwin_url=""
          linux_sig="";  linux_url=""
          windows_sig=""; windows_url=""

          # Updater payload selection per Tauri 2 install paths
          # (plugins/updater/src/updater.rs):
          #
          #   macOS  – install_inner() unconditionally does GzDecoder +
          #            tar::Archive. Only `.app.tar.gz` works; raw `.app`
          #            is not a supported updater payload.
          #   Linux  – install_appimage() detects format by magic bytes
          #            and accepts both raw `.AppImage` and wrapped
          #            `.AppImage.tar.gz`. We point at the raw bundle
          #            (canonical Tauri 2 form, already uploaded by
          #            tauri-action as the platform bundle).
          #   Windows – extract()/install_msi() accept raw `.msi` and
          #             wrapped `.msi.zip` the same way. We point at the
          #             raw bundle for the same reason.
          #
          # tauri-action uploads the raw `.AppImage` and `.msi` to the
          # release as platform bundles; our per-leg step above uploads
          # the matching `.sig` files (plus `Hecate.app.tar.gz` itself,
          # since macOS has no separate raw bundle).
          for sig in sigs/*.sig; do
            fname=$(basename "$sig")
            payload="${fname%.sig}"
            url="https://github.com/${REPO}/releases/download/${TAG}/${payload}"
            # Strip CR — sigs produced on Windows runners can have CRLF
            # line endings; trailing CR would land inside the JSON
            # `signature` string and break minisign verification on the
            # client. Bash's $(...) strips trailing \n but not \r.
            content=$(tr -d '\r' < "$sig")
            case "$payload" in
              *.app.tar.gz)                      darwin_sig="$content"; darwin_url="$url" ;;
              *.AppImage)                        linux_sig="$content";  linux_url="$url" ;;
              *.msi)                             windows_sig="$content"; windows_url="$url" ;;
              # Wrapped duplicates, NSIS installer, and other non-updater
              # bundle signatures — we don't reference these from
              # latest.json, but tauri's bundler signs them anyway
              # (*.exe / *.nsis.zip from "targets": "all" on Windows).
              # Silent skip; not an error.
              *.AppImage.tar.gz|*.msi.zip|*.deb|*.rpm|*.exe|*.nsis.zip) ;;
              *) echo "unexpected updater payload (skipped): $payload" ;;
            esac
          done

          # Sanity-check: every platform we ship must have a signature.
          # An empty signature means the matrix leg succeeded but
          # didn't produce an updater payload — shouldn't happen with
          # the current bundle config, but a missing one would silently
          # break that platform's auto-update.
          missing=()
          [ -z "$darwin_sig" ] && missing+=("darwin-aarch64")
          [ -z "$linux_sig" ]  && missing+=("linux-x86_64")
          [ -z "$windows_sig" ] && missing+=("windows-x86_64")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "missing updater signature(s): ${missing[*]}"
            exit 1
          fi

          jq -n \
            --arg version "$version" \
            --arg pub_date "$pub_date" \
            --arg darwin_sig "$darwin_sig" --arg darwin_url "$darwin_url" \
            --arg linux_sig "$linux_sig"   --arg linux_url "$linux_url" \
            --arg windows_sig "$windows_sig" --arg windows_url "$windows_url" \
            '{
              version: $version,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $darwin_sig, url: $darwin_url },
                "linux-x86_64":   { signature: $linux_sig,  url: $linux_url },
                "windows-x86_64": { signature: $windows_sig, url: $windows_url }
              }
            }' > latest.json
          cat latest.json
        env:
          TAG: ${{ inputs.tagName }}
          REPO: ${{ github.repository }}

      - name: Upload latest.json to release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.tagName }}" latest.json \
            --clobber \
            --repo "${{ github.repository }}"

  # Publish the manifest to the public website at
  # https://hecate.sh/releases/alpha/latest.json so the in-app
  # updater can find it without depending on GitHub's
  # "/releases/latest/" semantics (which refuses to resolve to
  # pre-releases — see docs/release.md's "Pre-release policy" and
  # docs/desktop-updater-signing.md).
  #
  # Mechanism: drop latest.json into website/public/releases/alpha/
  # and commit to master. The website.yml workflow's `paths:` filter
  # (website/**) picks up the commit, rebuilds Astro, and deploys
  # to Pages. Verification step below blocks until the new manifest
  # is live on hecate.sh — typical wall time 2-5 min.
  #
  # `needs: publish-updater-manifest` gates this on the GitHub
  # Release upload completing successfully; a website-publish
  # failure here doesn't take down the Release page itself.
  publish-updater-website:
    name: publish updater manifest to website
    if: inputs.tagName != ''
    needs: publish-updater-manifest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Fetch the manifest from the release we just published.
      # Avoids depending on artifact passing between jobs and keeps
      # this job recoverable — re-running it pulls the canonical
      # latest.json from the Release.
      - name: Download latest.json from release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tagName }}
        run: |
          set -euo pipefail
          gh release download "$TAG" \
            --pattern latest.json \
            --repo "${{ github.repository }}"

      # Drop the manifest under website/public/releases/alpha/ so
      # the next Astro build serves it at
      # https://hecate.sh/releases/alpha/latest.json. Commit to
      # master in a scratch worktree so the tag-commit checkout
      # we're running from stays untouched.
      #
      # Channel layout: releases/<channel>/latest.json. For now
      # only `alpha` exists; `beta` and `stable` slot in alongside
      # when those channels graduate. The bundle's tauri.conf.json
      # endpoints array decides which channel it reads.
      #
      # The `cmp -s` short-circuit makes re-runs of the same tag a
      # no-op in git history (which also keeps website.yml from
      # rebuilding for an unchanged manifest).
      #
      # Sets `changed` step output so the next step can decide
      # whether to dispatch the website workflow — GitHub's
      # auto-trigger doesn't fire on `github.token` pushes (loop
      # guard), so we have to dispatch website.yml explicitly. A
      # no-op commit (same content) skips the dispatch too.
      - name: Commit manifest to master
        id: commit
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tagName }}
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)
          git -C "$tmp" init -q
          git -C "$tmp" remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git -C "$tmp" fetch --depth=1 origin master:master
          git -C "$tmp" checkout master
          target="$tmp/website/public/releases/alpha/latest.json"
          if [ -f "$target" ] && cmp -s latest.json "$target"; then
            echo "manifest at $target already up to date — no-op"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p "$(dirname "$target")"
          cp latest.json "$target"
          git -C "$tmp" config user.name "github-actions[bot]"
          git -C "$tmp" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$tmp" add website/public/releases/alpha/latest.json
          git -C "$tmp" commit -m "publish updater manifest for $TAG"
          git -C "$tmp" push origin master
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # Pushes made with `github.token` deliberately do NOT trigger
      # downstream workflows — GitHub's anti-loop guard. The
      # website.yml workflow's `push` trigger therefore doesn't
      # see our commit. We fire it explicitly via workflow_dispatch
      # (which IS allowed for github.token per GitHub's docs).
      # Skipped when the prior step was a no-op.
      - name: Dispatch website workflow to rebuild + redeploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run website.yml \
            --ref master \
            --repo "${{ github.repository }}"

      # Block until the manifest is actually live at hecate.sh. We
      # just dispatched website.yml, which builds Astro and deploys
      # to Pages. Typical wall time: 2-5 min. Cap at 10 min and
      # fail loud if it overruns — that's the threshold past which
      # something probably went wrong (Pages deploy failed, Fastly
      # cache stuck, etc.) and a maintainer should look.
      #
      # Cache-buster on the URL bypasses any intermediate CDN
      # caching that would otherwise serve a stale manifest while
      # the deploy is mid-flight.
      #
      # Always runs (even on no-op commits) so a re-run of this job
      # against an already-published manifest also confirms the URL
      # is healthy. On a true no-op the first poll succeeds
      # immediately.
      - name: Verify manifest is live at hecate.sh
        env:
          TAG: ${{ inputs.tagName }}
        run: |
          set -euo pipefail
          want="${TAG#v}"
          deadline=$(( $(date +%s) + 600 ))
          while [ "$(date +%s)" -lt "$deadline" ]; do
            live=$(curl -sf "https://hecate.sh/releases/alpha/latest.json?cb=$(date +%s)" | jq -r '.version // ""' || true)
            if [ "$live" = "$want" ]; then
              echo "manifest live at hecate.sh, version=$live"
              exit 0
            fi
            echo "waiting for hecate.sh/releases/alpha/latest.json (saw version=${live:-(none)}, want $want)"
            sleep 15
          done
          echo "::error::manifest at hecate.sh/releases/alpha/latest.json did not advance to $want within 10 min"
          exit 1
