name: tauri-build

# Pre-tag validation for the Tauri native bundle pipeline. Mirrors the
# `tauri` job in release.yml but skips the upload step (omitting tagName
# tells tauri-action to build only). Keep this in sync with release.yml
# — GitHub Actions doesn't compose matrix jobs cleanly, so the
# duplication is intentional. When you change the build steps in one,
# change them in the other.
#
# Path filter scopes the run to changes that could plausibly break a
# Tauri build. Anything outside these paths skips the matrix entirely.

on:
  pull_request:
    paths:
      - 'tauri/**'
      - 'scripts/stamp-version.ts'
      - 'Makefile'
      - 'go.mod'
      - 'go.sum'
      - 'cmd/hecate/**'
      - 'ui/**'
      - '.github/workflows/tauri-build.yml'
      - '.github/workflows/release.yml'
  workflow_dispatch:

jobs:
  tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # stamp-version.ts resolves version from git tag

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri -> target

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf

      - name: Install UI dependencies
        run: make ui-install

      - name: Build hecate binary
        run: make build

      # Must come before `cargo check` — build.rs validates externalBin paths.
      - name: Stage hecate sidecar
        run: |
          mkdir -p tauri/src-tauri/binaries
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            if [[ -f hecate.exe ]]; then src=hecate.exe
            elif [[ -f hecate ]];     then src=hecate
            else echo "no hecate binary found after make build"; ls -la; exit 1
            fi
            cp "$src" "tauri/src-tauri/binaries/hecate-${{ matrix.target }}.exe"
          else
            cp hecate "tauri/src-tauri/binaries/hecate-${{ matrix.target }}"
          fi

      - name: Cargo check (Tauri Rust)
        run: cargo check --manifest-path tauri/src-tauri/Cargo.toml --target ${{ matrix.target }}

      # tauri-action's auto-install is unreliable with projectPath set;
      # install explicitly so node_modules/.bin/tauri exists for the build.
      - name: Install Tauri JS dependencies
        run: cd tauri && bun install --frozen-lockfile

      # On a PR there's no tag at HEAD; stamp-version.ts falls through to
      # `git describe --tags --abbrev=0` which returns the latest reachable
      # tag. That's fine — the stamped version doesn't need to be unique
      # since we're not uploading anything.
      - name: Stamp Tauri version
        run: bun scripts/stamp-version.ts

      # No tagName → tauri-action builds only, doesn't upload.
      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: tauri
          args: --bundles ${{ matrix.bundles }}
