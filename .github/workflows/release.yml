name: release

# Fires on tag pushes that look like a semver release. Manual dispatch stays
# available for re-runs when the workflow ref selector is set to an existing
# v* release tag; branch dispatches fail before checkout or build work.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# A tag-push and a manual dispatch on the same ref shouldn't fight.
# Don't cancel-in-progress for releases — half-completed releases are
# worse than waiting for the queued one.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # create the GitHub release + upload archives
  packages: write   # push images to ghcr.io

jobs:
  validate-release-ref:
    name: Validate release ref
    runs-on: ubuntu-latest
    steps:
      - name: Validate release ref
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          if [[ "$REF_TYPE" != "tag" || "$REF_NAME" != v* ]]; then
            echo "Release workflow requires a v* tag ref; got ${REF_TYPE} ${REF_NAME}." >&2
            exit 1
          fi

  # Compile both native mobile targets before creating any public release
  # assets. Store signing and upload remain separate credentialed operations.
  mobile:
    name: Tauri mobile builds
    needs: validate-release-ref
    uses: ./.github/workflows/_tauri-mobile-shared.yml
    permissions:
      contents: read
    with:
      uploadArtifacts: false

  goreleaser:
    needs: [validate-release-ref, mobile]
    runs-on: ubuntu-latest
    outputs:
      release_body_sha256: ${{ steps.release-body.outputs.sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0   # goreleaser needs full history to compute the changelog

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Set up just
        uses: extractions/setup-just@v4

      # QEMU isn't strictly required for Option B (we cross-compile Go on
      # the host), but docker buildx prefers having it available for the
      # alpine prep stage when building the arm64 image on an amd64
      # runner. Cheap to install; skips quickly if unused.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The release helper's ordinary tags contain only the version and should
      # keep GoReleaser's generated changelog. A maintainer may instead create
      # an annotated tag with substantive Markdown notes; preserve that public
      # release contract by passing the annotation to GoReleaser explicitly.
      - name: Prepare release notes
        id: release-notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tag_ref="refs/tags/${TAG}"
          tag_type=$(git cat-file -t "$tag_ref")
          if [[ "$tag_type" == "commit" ]]; then
            echo "args=release --clean" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$tag_type" != "tag" ]]; then
            echo "Release ref ${TAG} points to unsupported object type ${tag_type}." >&2
            exit 1
          fi
          tag_notes=$(git for-each-ref --format='%(contents)' "$tag_ref")
          if [[ "$tag_notes" == "$TAG" ]]; then
            echo "args=release --clean" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ -z "${tag_notes//[[:space:]]/}" ]]; then
            echo "Release tag ${TAG} has an empty annotation." >&2
            exit 1
          fi
          notes_path="$RUNNER_TEMP/release-notes.md"
          printf '%s\n' "$tag_notes" > "$notes_path"
          echo "args=release --clean --release-notes=$notes_path" >> "$GITHUB_OUTPUT"

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: ${{ steps.release-notes.outputs.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Record published release body
        id: release-body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          body_path="$RUNNER_TEMP/published-release-body.md"
          gh release view "$TAG" --repo "${{ github.repository }}" --json body --jq '.body' > "$body_path"
          if ! grep -q '[^[:space:]]' "$body_path"; then
            echo "GitHub Release ${TAG} has no release notes after GoReleaser." >&2
            exit 1
          fi
          echo "sha256=$(sha256sum "$body_path" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

  # Native desktop bundles. All matrix steps live in _tauri-shared.yml.
  tauri:
    needs: goreleaser
    uses: ./.github/workflows/_tauri-shared.yml
    secrets: inherit
    permissions:
      contents: write   # tauri-action uploads bundles to the existing release;
                        # publish-updater-website also commits latest.json to master
      actions: write    # publish-updater-website dispatches website.yml via
                        # workflow_dispatch. Reusable-workflow permissions are
                        # capped by the caller, so this MUST be granted here
                        # too — adding it only on the called job is not enough.
    with:
      tagName: ${{ github.ref_name }}

  update-release-docs:
    name: Update release docs
    needs: [goreleaser, tauri]
    runs-on: ubuntu-latest
    # The goreleaser job rejects non-tag refs before release work begins.
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout master
        uses: actions/checkout@v7
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Verify release body was preserved
        env:
          EXPECTED_SHA256: ${{ needs.goreleaser.outputs.release_body_sha256 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          body_path="$RUNNER_TEMP/final-release-body.md"
          gh release view "$TAG" --repo "${{ github.repository }}" --json body --jq '.body' > "$body_path"
          if ! grep -q '[^[:space:]]' "$body_path"; then
            echo "GitHub Release ${TAG} has no release notes after desktop packaging." >&2
            exit 1
          fi
          if [[ ! "$EXPECTED_SHA256" =~ ^[0-9a-f]{64}$ ]]; then
            echo "GoReleaser did not report a valid release-body digest." >&2
            exit 1
          fi
          actual_sha256=$(sha256sum "$body_path" | awk '{print $1}')
          if [[ "$actual_sha256" != "$EXPECTED_SHA256" ]]; then
            echo "GitHub Release ${TAG} body changed during desktop packaging." >&2
            echo "expected sha256: $EXPECTED_SHA256" >&2
            echo "actual sha256:   $actual_sha256" >&2
            exit 1
          fi

      - name: Regenerate release docs
        run: bun scripts/update-release-links.ts "${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit release docs refresh
        run: |
          if git diff --quiet README.md docs/operator/deployment.md docs/operator/desktop-app.md; then
            echo "Release docs already current"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/operator/deployment.md docs/operator/desktop-app.md
          git commit -m "docs: update release references [skip ci]" \
            -m "Refresh the Desktop app download table from the actual assets uploaded to the GitHub Release for ${{ github.ref_name }}." \
            -m "Also update pinned Docker and tarball examples so post-release docs match the published tag." \
            -m "Generated by scripts/update-release-links.ts after the Tauri release matrix completes."
          git push origin master
