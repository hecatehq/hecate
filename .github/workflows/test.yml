name: Test

on:
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**/*.md'
  # merge_group fires for PRs in a GitHub merge queue. Listing it here is a
  # no-op until queues are enabled, but adding it now means turning queues on
  # later is a one-line setting flip rather than a workflow edit.
  merge_group:
  # workflow_dispatch lets us trigger a full run manually from the Actions tab
  # without pushing a no-op commit (handy after flake fixes or for debugging
  # cache behaviour).
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-progress runs for the same branch / PR when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      typescript: ${{ steps.filter.outputs.typescript }}
      tauri: ${{ steps.filter.outputs.tauri }}
      workflow: ${{ steps.filter.outputs.workflow }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # The `workflow` filter is OR'd into both downstream gates so a
          # change to this file always re-runs every job — the alternative
          # (listing the workflow path under both `go` and `typescript`)
          # silently drifts when one filter is updated without the other.
          filters: |
            workflow:
              - '.github/workflows/test.yml'
            docker:
              - 'Dockerfile'
              - '.dockerignore'
              - 'docker-compose.yml'
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
            typescript:
              - 'ui/**/*.ts'
              - 'ui/**/*.tsx'
              - 'ui/package.json'
              - 'ui/bun.lock'
              - 'ui/tsconfig.json'
              - 'ui/tsconfig.*.json'
              - 'ui/vite.config.*'
              - 'ui/vitest.config.*'
              - 'ui/playwright.config.*'
              - 'ui/e2e/**'
            tauri:
              - 'tauri/src-tauri/**/*.rs'
              - 'tauri/src-tauri/Cargo.toml'
              - 'tauri/src-tauri/Cargo.lock'
              - 'tauri/src-tauri/tauri.conf.json'

  test-tauri-rust:
    name: Tauri Rust tests
    needs: changes
    if: needs.changes.outputs.tauri == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri -> target

      - name: Test
        run: cargo test
        working-directory: tauri/src-tauri

  lint-go:
    name: Lint (go)
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Check formatting
        run: test -z "$(gofmt -s -l $(git ls-files '*.go'))"

      - name: Vet
        run: go vet ./...

  test-go:
    name: Go tests
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test -race -timeout 10m ./...

  build-gateway:
    name: Build gateway
    needs: changes
    # Triggers on Go OR TypeScript changes because the gateway binary now
    # embeds the built UI via //go:embed — a typescript-only change must
    # produce a rebuilt binary so any embed regression is caught here.
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.typescript == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ui/package.json
          cache: true

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install UI dependencies
        run: bun install --frozen-lockfile
        working-directory: ui

      - name: Build UI bundle
        run: bun run build
        working-directory: ui

      - name: Build gateway binary
        run: go build -o gateway ./cmd/gateway

      - name: Upload gateway artifact
        uses: actions/upload-artifact@v7
        with:
          name: gateway-binary
          path: gateway
          retention-days: 1
          if-no-files-found: error

  e2e:
    name: E2E tests (fake upstream)
    needs: [changes, build-gateway]
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download gateway binary
        uses: actions/download-artifact@v8
        with:
          name: gateway-binary
          path: /tmp

      - name: Run e2e tests
        run: |
          chmod +x /tmp/gateway
          go test -tags e2e -count=1 -timeout 3m ./e2e/...
        env:
          E2E_GATEWAY_BIN: /tmp/gateway

  e2e-ollama:
    name: E2E tests (Ollama)
    needs: [changes, build-gateway]
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download gateway binary
        uses: actions/download-artifact@v8
        with:
          name: gateway-binary
          path: /tmp

      - name: Cache Ollama model weights
        uses: actions/cache@v5
        with:
          path: ~/.ollama/models
          # Bump the suffix to force a fresh pull when you change the model.
          key: ollama-${{ runner.os }}-smollm2-135m-v1

      # Cache the Ollama image as a saved tarball. ~300 MB compressed, but it
      # avoids the Docker Hub round-trip on every run and decouples CI from
      # rate limits / hub outages.
      - name: Cache Ollama Docker image
        id: ollama-image-cache
        uses: actions/cache@v5
        with:
          path: /tmp/ollama-image.tar
          key: docker-ollama-0.5.7

      - name: Load or pull Ollama image
        run: |
          if [ -f /tmp/ollama-image.tar ]; then
            docker load -i /tmp/ollama-image.tar
          else
            docker pull ollama/ollama:0.5.7
            docker save -o /tmp/ollama-image.tar ollama/ollama:0.5.7
          fi

      - name: Start Ollama
        run: |
          docker run -d \
            --name ollama \
            -p 11434:11434 \
            -v "$HOME/.ollama:/root/.ollama" \
            ollama/ollama:0.5.7
          timeout 30 bash -c 'until curl -sf http://127.0.0.1:11434; do sleep 2; done'

      - name: Pull model
        run: docker exec ollama ollama pull smollm2:135m

      - name: Run e2e Ollama tests
        # -run TestOllama: fake-upstream (TestGateway*) tests are already covered
        # by the e2e job running in parallel.
        run: |
          chmod +x /tmp/gateway
          go test -tags 'e2e ollama' -count=1 -run TestOllama -timeout 10m ./e2e/...
        env:
          E2E_GATEWAY_BIN: /tmp/gateway
          OLLAMA_HOST: http://127.0.0.1:11434

  docker-smoke:
    name: Docker smoke
    needs: changes
    # Triggers on go/ts/dockerfile/compose changes — anything that could
    # cause `docker compose up` to break in production. The smoke test
    # rebuilds the image inside docker compose, so we don't depend on
    # build-gateway's artifact.
    if: |
      needs.changes.outputs.go == 'true' ||
      needs.changes.outputs.typescript == 'true' ||
      needs.changes.outputs.docker == 'true' ||
      needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Buildx + GHA cache means cold image builds (~30-60s) drop to a
      # few seconds when the source layers haven't changed. Without it
      # the smoke job would rebuild the full UI + Go binary every run.
      - uses: docker/setup-buildx-action@v4

      - name: Run docker smoke test
        run: go test -tags 'e2e docker' -count=1 -timeout 5m ./e2e/...

  typescript:
    name: TypeScript tests
    needs: changes
    if: needs.changes.outputs.typescript == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          # Reads the version from package.json "packageManager" field so CI
          # always matches what's declared locally.
          bun-version-file: ui/package.json
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build first so typecheck failures fail-fast (the build script is
      # `tsgo -b && vite build` — no point running tests on a TS-broken
      # tree). We don't need a separate `bun run typecheck` step: the
      # build invokes the same tsgo, so the standalone call would be
      # duplicate work.
      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

  typescript-e2e:
    name: TypeScript E2E tests
    # Gate on the main TypeScript job so we don't burn ~2 minutes of
    # Playwright browser-install + e2e on a build that already failed
    # typecheck / unit tests. `changes` is in `needs` for the same
    # filter we use everywhere else; the `if` matches the unit job.
    needs: [changes, typescript]
    if: needs.changes.outputs.typescript == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ui/package.json
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Cache Playwright browser binaries (~150 MB) keyed on bun.lock so the
      # cache invalidates whenever @playwright/test is bumped.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('ui/bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      # Always install OS-level system deps (fast apt-get, not a download).
      # Only download the ~150 MB Chromium binary on a cache miss.
      - name: Install Playwright system deps
        run: bunx playwright install-deps chromium

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium

      - name: E2E tests
        run: bun run test:e2e
