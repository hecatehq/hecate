name: Links

# Catches broken relative links in agent-guidance files (AGENTS.md, CLAUDE.md,
# ai/**, .cursor/rules/**, nested AGENTS.md / SKILL.md) and the long-form
# product docs in docs/. The Test workflow path-ignores **/*.md, so without
# this dedicated workflow markdown drift would land unchecked. Also runs
# weekly on a schedule to surface external link rot.

on:
  push:
    branches: [master]
    paths:
      - '**/*.md'
      - '**/*.mdc'
      - '.lycheeignore'
      - 'scripts/check-mermaid.ts'
      - '.github/workflows/links.yml'
  pull_request:
    branches: [master]
    paths:
      - '**/*.md'
      - '**/*.mdc'
      - '.lycheeignore'
      - 'scripts/check-mermaid.ts'
      - '.github/workflows/links.yml'
  # Weekly to surface external link rot without anyone touching the docs.
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mermaid:
    name: Check Mermaid diagrams
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Validate Mermaid diagrams
        run: bun scripts/check-mermaid.ts

  lychee-internal:
    name: Check relative links (hard fail)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run lychee (local files only)
        uses: lycheeverse/lychee-action@v2
        with:
          # Scope to file:// and relative refs only — external URLs handled
          # by the soft-fail job below. --include-fragments catches broken
          # anchors like docs/foo.md#section.
          args: >-
            --no-progress
            --include-fragments
            --scheme file
            --exclude-path .gomodcache
            --exclude-path ui/node_modules
            --exclude-path .claude/skills
            './**/*.md'
            './**/*.mdc'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lychee-external:
    name: Check external links (informational)
    runs-on: ubuntu-latest
    # External URL rot should not block PRs — network is flaky and maintainers
    # act on these out-of-band. The job result is still visible in the summary.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Run lychee (external URLs only)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --include-fragments
            --scheme https
            --scheme http
            --exclude-path .gomodcache
            --exclude-path ui/node_modules
            --exclude-path .claude/skills
            './**/*.md'
            './**/*.mdc'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
