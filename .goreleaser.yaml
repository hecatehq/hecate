# goreleaser config — see https://goreleaser.com
#
# Triggered by .github/workflows/release.yml on `v*` tag pushes.
# Locally: `goreleaser release --snapshot --clean` to dry-run without
# publishing (skips the docker push and GitHub release).
#
# The UI bundle has to be built BEFORE goreleaser runs the Go cross-
# compile, because cmd/gateway uses //go:embed ui/dist. The `before:`
# hook handles that — bun is fast and runs once on the host, before
# any goarch loop starts.

version: 2

before:
  hooks:
    - bun install --cwd ui --frozen-lockfile
    - bun run --cwd ui build

builds:
  - id: gateway
    main: ./cmd/gateway
    binary: gateway
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/hecate/agent-runtime/internal/version.Version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: gateway
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - LICENSE*
      - README.md

# Per-arch docker images. goreleaser stages the freshly cross-compiled
# binary into the build context as `gateway`, then docker buildx builds
# Dockerfile.release for the matching --platform. The two arch-specific
# images are stitched together into a multi-arch manifest below.
dockers:
  - image_templates:
      - "ghcr.io/chicoxyzzy/hecate:{{ .Version }}-amd64"
    dockerfile: Dockerfile.release
    use: buildx
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/chicoxyzzy/hecate"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"

  - image_templates:
      - "ghcr.io/chicoxyzzy/hecate:{{ .Version }}-arm64"
    dockerfile: Dockerfile.release
    use: buildx
    goos: linux
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/chicoxyzzy/hecate"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"

# Multi-arch manifests so `docker pull ghcr.io/chicoxyzzy/hecate:vX.Y.Z`
# resolves to the right arch automatically. We push both a versioned
# manifest and `:latest`.
docker_manifests:
  - name_template: "ghcr.io/chicoxyzzy/hecate:{{ .Version }}"
    image_templates:
      - "ghcr.io/chicoxyzzy/hecate:{{ .Version }}-amd64"
      - "ghcr.io/chicoxyzzy/hecate:{{ .Version }}-arm64"
  - name_template: "ghcr.io/chicoxyzzy/hecate:latest"
    image_templates:
      - "ghcr.io/chicoxyzzy/hecate:{{ .Version }}-amd64"
      - "ghcr.io/chicoxyzzy/hecate:{{ .Version }}-arm64"

checksum:
  name_template: "checksums.txt"

# Homebrew tap publication. On every tag goreleaser regenerates
# Formula/hecate.rb in chicoxyzzy/homebrew-tap with fresh darwin/linux
# × amd64/arm64 download URLs and SHA-256s, so users can:
#
#     brew install chicoxyzzy/tap/hecate
#
# We deliberately publish alpha tags too — Hecate is pre-1.0 and the
# tap would otherwise stay empty until v1. Switch to `skip_upload: auto`
# once a stable channel exists if you want `brew install` to ignore
# alphas.
#
# Requires HOMEBREW_TAP_TOKEN (a GitHub PAT with `repo` scope on
# chicoxyzzy/homebrew-tap) to be set as a repo secret. Without it the
# release fails; locally with --snapshot the section is skipped.
brews:
  - name: hecate
    repository:
      owner: chicoxyzzy
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/chicoxyzzy/hecate"
    description: "Open-source self-hosted AI gateway and agent-task runtime"
    license: "MIT"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore(formula): bump hecate to {{ .Tag }}"
    install: |
      bin.install "gateway" => "hecate"
    test: |
      assert_match version.to_s, shell_output("#{bin}/hecate --version")
    caveats: |
      Hecate binds 127.0.0.1:8765 by default. After `hecate` is running,
      open the operator UI at:
        http://127.0.0.1:8765
      Hecate has no built-in auth — put your own auth in front if you
      expose it to a network.

release:
  github:
    owner: chicoxyzzy
    name: hecate
  draft: false
  prerelease: auto
