# goreleaser config — see https://goreleaser.com
#
# Triggered by .github/workflows/release.yml on `v*` tag pushes.
# Locally: `goreleaser release --snapshot --clean` to dry-run without
# publishing (skips the docker push and GitHub release).
#
# The UI bundle has to be built BEFORE goreleaser runs the Go cross-
# compile, because cmd/hecate uses //go:embed ui/dist. The `before:`
# hook handles that — bun is fast and runs once on the host, before
# any goarch loop starts.

version: 2

before:
  hooks:
    - bun install --cwd ui --frozen-lockfile
    - just ui-build

builds:
  - id: hecate
    main: ./cmd/hecate
    binary: hecate
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/hecate/agent-runtime/internal/version.Version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
  - id: hecate-acp
    main: ./cmd/hecate-acp
    binary: hecate-acp
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/hecate/agent-runtime/internal/version.Version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: binaries
    ids:
      - hecate
      - hecate-acp
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - LICENSE*
      - README.md

# Multi-arch Docker image. GoReleaser stages the freshly cross-compiled
# hecate and hecate-acp binaries under linux/<arch>/ and docker buildx builds
# a manifest for linux/amd64 + linux/arm64. The container still starts
# `hecate` by default; hecate-acp is included so every distribution shape
# carries the same ACP bridge companion.
dockers_v2:
  - id: hecate
    dockerfile: Dockerfile.release
    ids:
      - hecate
      - hecate-acp
    images:
      - "ghcr.io/hecatehq/hecate"
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      "org.opencontainers.image.source": "https://github.com/hecatehq/hecate"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: hecatehq
    name: hecate
  draft: false
  prerelease: auto
