<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hecate</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        height: 100%;
        background: #0a0a0a;
        color: #e5e5e5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        -webkit-user-select: none;
      }
      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }
      .wordmark {
        font-size: 28px;
        font-weight: 600;
        letter-spacing: -0.5px;
        color: #fff;
      }
      .dots {
        display: flex;
        gap: 8px;
      }
      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #555;
        animation: pulse 1.2s ease-in-out infinite;
      }
      .dot:nth-child(2) { animation-delay: 0.2s; }
      .dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes pulse {
        0%, 80%, 100% { background: #555; transform: scale(1); }
        40%            { background: #aaa; transform: scale(1.3); }
      }
      .status {
        font-size: 13px;
        color: #555;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="wordmark">Hecate</div>
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="status" id="status">Starting gateway…</div>
    </div>
  </body>
</html>
